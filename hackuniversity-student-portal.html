<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hack University Student Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-primary: #1a73e8;
      --color-primary-hover: #1557b0;
      --color-text: #202124;
      --color-text-muted: #5f6368;
      --color-border: #dadce0;
      --color-bg: #f8f9fa;
      --color-bg-white: #fff;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 3px 10px rgba(32,33,36,.18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Google Sans","Roboto",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background: linear-gradient(180deg, #f8f9fa 0%, #eef4ff 100%);
      color: var(--color-text);
      padding-top: 78px;
    }
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--color-bg-white);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
      padding: 12px 0;
    }
    .nav-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand a { color: #1a73e8; font-weight: 800; text-decoration: none; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      min-height: 42px;
      padding: 10px 16px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: var(--shadow-sm);
    }
    .btn-primary { background: var(--color-primary); color: #fff; }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-soft { background: #eef4ff; color: #174ea6; border-color: #c7dafd; }
    .card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: 16px;
      box-shadow: var(--shadow-md);
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-brand"><a href="https://codecrunchglobal.vercel.app/hackuniversity.html">Hack University Student Portal</a></div>
      <a class="btn btn-soft" href="https://codecrunchglobal.vercel.app/hackuniversity.html">Back to Main Page</a>
    </div>
  </nav>

  <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <section class="card p-6 sm:p-8">
      <p class="text-xs tracking-wide uppercase text-blue-700 font-bold">Portal Access</p>
      <h1 class="text-2xl sm:text-3xl font-extrabold mt-2">Welcome to Your Student Portal</h1>
      <p id="portal-message" class="text-sm text-gray-600 mt-3">Loading your account details...</p>

      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-3 mt-6">
        <a class="btn btn-primary" href="https://hackuniversity-onestop.vercel.app/" target="_blank" rel="noopener">
          <i class="fa-solid fa-right-to-bracket"></i> Open Main Portal
        </a>
        <a class="btn btn-soft" href="https://codecrunchglobal.vercel.app/hackuniversity-certifcatemembership.html" target="_blank" rel="noopener">
          <i class="fa-solid fa-certificate"></i> Membership Certificates
        </a>
        <a class="btn btn-soft" href="https://codecrunchglobal.vercel.app/hackuniversity-discord.html" target="_blank" rel="noopener">
          <i class="fab fa-discord"></i> Community Access
        </a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const messageEl = document.getElementById("portal-message");
      const params = new URLSearchParams(window.location.search);
      const email = (params.get("email") || "").trim();
      if (!messageEl) return;
      if (email) {
        messageEl.textContent = `Signed in as ${email}. Use the portal actions below to manage your student access, events, and certificates.`;
      } else {
        messageEl.textContent = "Use the portal actions below to continue with student access and membership tools.";
      }
    })();
  </script>
</body>
</html>
